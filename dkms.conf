PACKAGE_NAME="magicbay-hud"
PACKAGE_VERSION="3.0.3.13-r2"

BUILT_MODULE_NAME[0]="usbdisp_drm"
BUILT_MODULE_LOCATION[0]="drm"
DEST_MODULE_LOCATION[0]="/kernel/drivers/gpu/drm/magicbay"

BUILT_MODULE_NAME[1]="usbdisp_usb"
BUILT_MODULE_LOCATION[1]="drm"
DEST_MODULE_LOCATION[1]="/kernel/drivers/usb/magicbay"

MAKE[0]="env -u KERNELRELEASE make KVER=${kernelver} KDIR=/lib/modules/${kernelver}/build"
AUTOINSTALL="yes"
